<div id="displayControlRow">
    <button hx-post="/display/show" hx-swap="afterbegin">Open Display Window</button>
    <button hx-post="/display/start" hx-swap="afterbegin">Start playing next queue element</button>
    <button hx-post="/display/skip" hx-swap="afterbegin">Skip to end of current media</button>
    <button hx-post="/display/pause" hx-swap="afterbegin">Pause/Unpause currently running media</button>
</div>
